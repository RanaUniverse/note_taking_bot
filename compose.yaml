services:
  core_app:
    build:
      context: .
      dockerfile: Dockerfile.core_app

    restart: always

    volumes:
      - my_data:/app/DATABASE.db
      - my_data_log:/app/RanaUniverse_Log_File.log

    env_file:
      - ".env"

    image: tg_core_app:1.0.0

volumes:
  my_data:
  my_data_log:
